services:
  postgres:
    image: postgres:16
    container_name: bgd_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: citibike
      POSTGRES_DB: citibike
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/sql:ro
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./data/raw:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citibike -d citibike"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: apache/kafka:3.9.0
    container_name: bgd_kafka

    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-29092}

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_MESSAGE_MAX_BYTES: 10485760          # 10MB
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760    # 10MB
      KAFKA_MAX_REQUEST_SIZE: 10485760

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bgd_kafka_ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      kafka:
        condition: service_started

volumes:
  pg_data:
    name: bgd_pg_data
